<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NexoraNova - Uncensored AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="description" id="meta-desc">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0c;
  color: #fff;
}

header {
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  background: #111;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.lang-switch {
  font-size: 14px;
  cursor: pointer;
  color: #aaa;
}

.lang-switch span {
  margin: 0 5px;
}

.lang-switch span:hover {
  color: #fff;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.gallery {
  flex: 1;
  min-width: 300px;
}

.main-img {
  width: 100%;
  border-radius: 12px;
}

.info {
  flex: 1;
  min-width: 280px;
}

h1 {
  margin-bottom: 10px;
}

.desc {
  color: #aaa;
  margin-bottom: 15px;
  white-space: pre-line;
}

.price {
  color: #4ade80;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 15px;
}

select, button {
  padding: 12px;
  width: 100%;
  background: #4ade80;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

select {
  margin-bottom: 15px;
}

.back {
  margin-top: 20px;
  display: inline-block;
  color: #aaa;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  NexoraMarket
  <div class="lang-switch">
    <span onclick="setLang('ru')">RU</span> |
    <span onclick="setLang('en')">ENG</span>
  </div>
</header>

<div class="container">

  <div class="gallery">
    <img id="mainImage" class="main-img" src="NexoraNova-Uncensored.png">
  </div>

  <div class="info">
    <h1 id="title"></h1>

    <div id="main-desc" class="desc"></div>

    <label id="version-label"></label>

    <select id="version-select" onchange="updatePriceAndDescription()">
      <option value="q4">Q4</option>
      <option value="q6">Q6</option>
      <option value="q8">Q8</option>
      <option value="bf16">BF16</option>
    </select>

    <label id="currency-label">Валюта</label>
    <select id="currency-select" onchange="updatePriceAndDescription()">
      <option value="usdt">USDT</option>
      <option value="btc">BTC</option>
      <option value="xmr">XMR</option>
    </select>

    <div id="current-description" class="desc"></div>
    <div id="current-price" class="price"></div>

    <button id="buy-btn" onclick="buy()"></button>

    <a href="../index.html" class="back" id="back-btn">← Back</a>
  </div>

</div>

<script>
let lang = localStorage.getItem("lang") || "ru";

const product = {
  title: {
    ru: "NexoraNova AI",
    en: "NexoraNova AI"
  },
  description: {
    ru: "Локальная нейросеть без ограничений.\n\nСистемные требования:\n• Q4: ~6-8GB VRAM\n• Q6: ~10GB VRAM\n• Q8: ~12GB VRAM\n• BF16: ~18GB+ VRAM (GPU обязателен)",
    en: "Local neural network without restrictions.\n\nSystem requirements:\n• Q4: ~6-8GB VRAM\n• Q6: ~10GB VRAM\n• Q8: ~12GB VRAM\n• BF16: ~18GB+ VRAM (GPU required)"
  },
  prices: {
    q4:   { usdt: 60,  btc: 0.0009,  xmr: 0.19 },
    q6:   { usdt: 90,  btc: 0.0013,  xmr: 0.27 },
    q8:   { usdt: 140, btc: 0.0021,  xmr: 0.40 },
    bf16: { usdt: 300, btc: 0.0044,  xmr: 1.05 }
  },
  versions: {
    q4: {
      ru: "Быстрая версия, минимальная нагрузка",
      en: "Fast version, minimal load"
    },
    q6: {
      ru: "Баланс качества и скорости",
      en: "Balanced quality and speed"
    },
    q8: {
      ru: "Хорошее качество генерации",
      en: "Good generation quality"
    },
    bf16: {
      ru: "Эталон качества (без сжатия, максимальная точность)",
      en: "Reference quality (no compression, maximum accuracy)"
    }
  }
};

const translations = {
  ru: {
    buy: "Купить",
    back: "← Назад",
    version: "Выберите версию",
    currency: "Выберите валюту",
    subject: "Покупка"
  },
  en: {
    buy: "Buy",
    back: "← Back",
    version: "Select version",
    currency: "Select currency",
    subject: "Purchase"
  }
};

function applyTranslations() {
  document.getElementById("buy-btn").innerText = translations[lang].buy;
  document.getElementById("back-btn").innerText = translations[lang].back;
  document.getElementById("version-label").innerText = translations[lang].version;
  document.getElementById("currency-label").innerText = translations[lang].currency;
}

function applyContent() {
  document.getElementById("title").innerText = product.title[lang];
  document.getElementById("main-desc").innerText = product.description[lang];
  document.getElementById("meta-desc").setAttribute("content", product.description[lang]);

  updatePriceAndDescription();
}

function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);

  applyTranslations();
  applyContent();
}

function updatePriceAndDescription() {
  const version = document.getElementById("version-select").value;
  const currency = document.getElementById("currency-select").value;

  const description = product.versions[version][lang];
  const price = product.prices[version][currency];

  document.getElementById("current-description").innerText = description;
  document.getElementById("current-price").innerText =
    price + " " + currency.toUpperCase();
}

function buy() {
  const version = document.getElementById("version-select").value;
  const currency = document.getElementById("currency-select").value;

  const subject = encodeURIComponent(
    `${translations[lang].subject}: ${product.title[lang]} (${version}, ${currency})`
  );

  window.location.href = `mailto:nexoramarket@proton.me?subject=${subject}`;
}

applyTranslations();
applyContent();
</script>

</body>
</html>
